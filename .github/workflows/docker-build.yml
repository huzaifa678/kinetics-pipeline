name: docker-build

on:
  push:
    branches: [main]
    paths:
      - "training/**"
      - ".github/workflows/docker-build.yml"
  workflow_dispatch:

permissions:
  id-token: write 
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag
        id: meta
        run: echo "tag=sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ECR_PUSH }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Log in to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: training
          platforms: linux/amd64
          push: true
          # Immutable repo: push only the unique SHA tag (never overwrite latest).
          tags: ${{ vars.ECR_REPOSITORY }}:${{ steps.meta.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Separate, reusable workflow: bump the tag in the GitOps repo and push.
  bump-gitops:
    needs: build
    uses: ./.github/workflows/update-gitops.yml
    with:
      image_tag: ${{ needs.build.outputs.image_tag }}
    secrets: inherit

name: docker-build

on:
  push:
    branches: [main]
    paths:
      - "training/**"
      - ".github/workflows/docker-build.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  security-events: write 

# Serialize whole runs: the bump-* jobs push to the same GitOps repo, so two
# overlapping runs (e.g. quick successive merges) must not race. Queue, never
# cancel — every pushed image still gets its GitOps bump.
concurrency:
  group: docker-build
  cancel-in-progress: false

jobs:
  # Single source of truth for the image tags (also consumed by the bumps).
  tags:
    runs-on: ubuntu-latest
    outputs:
      train_tag: ${{ steps.meta.outputs.train_tag }}
      serve_tag: ${{ steps.meta.outputs.serve_tag }}
      seldon_tag: ${{ steps.meta.outputs.seldon_tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Compute image tags
        id: meta
        run: |
          short=$(git rev-parse --short HEAD)
          # Distinct prefixes: training (sha-), FastAPI edge (serve-) and the
          # Seldon custom MLServer runtime (seldon-) share the ECR repo but never
          # collide, so immutable-tag pushes stay safe.
          echo "train_tag=sha-$short" >> "$GITHUB_OUTPUT"
          echo "serve_tag=serve-$short" >> "$GITHUB_OUTPUT"
          echo "seldon_tag=seldon-$short" >> "$GITHUB_OUTPUT"

  # Build + push all three images in parallel. They share the training/ context
  # (src/ + pyproject), so each rebuilds on any training/** change; the buildx
  # gha cache (per-scope) keeps unchanged images cheap.
  build:
    needs: tags
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: training, file: training/Dockerfile, scope: training, tag: "${{ needs.tags.outputs.train_tag }}" }
          - { name: serving, file: training/Dockerfile.serve, scope: serving, tag: "${{ needs.tags.outputs.serve_tag }}" }
          - { name: seldon, file: training/Dockerfile.seldon, scope: seldon, tag: "${{ needs.tags.outputs.seldon_tag }}" }
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ECR_PUSH }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Log in to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.name }} image (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: training
          file: ${{ matrix.file }}
          platforms: linux/amd64
          push: true
          # Immutable repo: push only the unique SHA tag (never overwrite latest).
          tags: ${{ vars.ECR_REPOSITORY }}:${{ matrix.tag }}
          cache-from: type=gha,scope=${{ matrix.scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.scope }}

      - name: Trivy image scan (${{ matrix.name }})
        uses: aquasecurity/trivy-action@0.36.0
        with:
          image-ref: ${{ vars.ECR_REPOSITORY }}:${{ matrix.tag }}
          format: sarif
          output: trivy-${{ matrix.scope }}.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"
        env:
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db
          TRIVY_JAVA_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-java-db

      - name: Upload Trivy SARIF (${{ matrix.name }})
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.scope }}.sarif
          category: trivy-${{ matrix.scope }}

name: terraform-plan

on:
  pull_request:
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-plan.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "tfvars profile to plan"
        type: choice
        default: dev
        options:
          - dev
          - prod
          - test
          - novpn # dev + Client VPN OFF
          - kafka # dev + MSK ON

permissions:
  id-token: write # required for OIDC
  contents: read
  pull-requests: write # to post the plan comment

env:
  TF_VERSION: "1.10.5"

jobs:
  plan:
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - layer: infra
            runs_on: ubuntu-latest
          - layer: cluster
            runs_on: [self-hosted, vpc]
    defaults:
      run:
        working-directory: terraform/${{ matrix.layer }}
    steps:
      - uses: actions/checkout@v4

      # On dispatch, resolve the profile -> -var-file chain (same mapping as
      # terraform-apply). On PR, leave it empty to plan with variable defaults.
      - name: Resolve tfvars profile
        id: profile
        env:
          PROFILE: ${{ github.event.inputs.environment }}
        run: |
          files=""
          case "$PROFILE" in
            "")    : ;; # PR: variable defaults
            dev)   files="-var-file=terraform.tfvars.dev" ;;
            prod)  files="-var-file=terraform.tfvars.prod" ;;
            test)  files="-var-file=terraform.tfvars.test" ;;
            novpn) files="-var-file=terraform.tfvars.dev -var-file=terraform.tfvars.novpn" ;;
            kafka) files="-var-file=terraform.tfvars.dev -var-file=terraform.tfvars.kafka" ;;
            *) echo "::error::unknown profile '$PROFILE'"; exit 1 ;;
          esac
          # Keep only var-files that exist in THIS layer — the cluster layer
          # legitimately relies on module defaults for some envs (no tfvars file).
          kept=""
          for f in $(echo "$files" | tr ' ' '\n' | sed 's/-var-file=//'); do
            if [ -f "$f" ]; then kept="$kept -var-file=$f"; else echo "::notice::${{ matrix.layer }}: no $f (using defaults)"; fi
          done
          echo "var_files=$kept" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TF_PLAN }}
          aws-region: ${{ vars.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "${{ env.TF_VERSION }}"
          terraform_wrapper: false

      - name: Init
        run: terraform init -input=false

      - name: Plan
        id: plan
        run: |
          set +e
          terraform plan ${{ steps.profile.outputs.var_files }} -no-color -input=false -lock-timeout=120s -out=tfplan | tee plan.txt
          echo "exitcode=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Policy (OPA / Conftest)
        if: steps.plan.outputs.exitcode == '0'
        uses: ./.github/actions/opa-policy
        with:
          working-directory: terraform/${{ matrix.layer }}
          plan-file: tfplan

      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const layer = '${{ matrix.layer }}';
            let plan = fs.readFileSync(`terraform/${layer}/plan.txt`, 'utf8');
            const max = 60000;
            if (plan.length > max) plan = plan.slice(0, max) + '\n... (truncated)';
            const body = `### Terraform Plan — \`${layer}\`\n\`\`\`\n${plan}\n\`\`\``;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Plan to run summary (dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          {
            echo "### Terraform Plan — profile \`${{ github.event.inputs.environment }}\`"
            echo '```'
            cat plan.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail if plan errored
        if: steps.plan.outputs.exitcode != '0'
        run: exit 1

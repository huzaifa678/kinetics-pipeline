name: terraform-plan

on:
  pull_request:
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-plan.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "env to plan (selects the live/<env> Terragrunt tree)"
        type: choice
        default: dev
        options:
          - dev
          - prod

permissions:
  id-token: write # required for OIDC
  contents: read
  pull-requests: write # to post the plan comment

env:
  TF_VERSION: "1.10.5"
  # PR plans default to the dev tree; dispatch picks dev/prod. Values come from the
  # unit's Terragrunt inputs (no -var-file).
  ENV: ${{ github.event.inputs.environment || 'dev' }}

jobs:
  plan:
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - layer: infra
            runs_on: ubuntu-latest
          - layer: cluster
            runs_on: [self-hosted, vpc]
    defaults:
      run:
        working-directory: terraform/live/${{ github.event.inputs.environment || 'dev' }}/${{ matrix.layer }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TF_PLAN }}
          aws-region: ${{ vars.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "${{ env.TF_VERSION }}"
          terraform_wrapper: false

      - name: Setup Terragrunt
        uses: ./.github/actions/setup-terragrunt

      - name: Init
        run: terragrunt init -input=false

      - name: Plan
        id: plan
        env:
          LAYER: ${{ matrix.layer }}
        run: |
          set +e
          terragrunt plan -no-color -input=false -lock-timeout=120s -out="$GITHUB_WORKSPACE/terraform/live/$ENV/$LAYER/tfplan" | tee plan.txt
          echo "exitcode=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Policy (OPA / Conftest)
        if: steps.plan.outputs.exitcode == '0'
        uses: ./.github/actions/opa-policy
        with:
          working-directory: terraform/live/${{ env.ENV }}/${{ matrix.layer }}
          plan-file: ${{ github.workspace }}/terraform/live/${{ env.ENV }}/${{ matrix.layer }}/tfplan
          tool: terragrunt

      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          ENVIRONMENT: ${{ env.ENV }}
          LAYER: ${{ matrix.layer }}
        with:
          script: |
            const fs = require('fs');
            const layer = process.env.LAYER;
            const environment = process.env.ENVIRONMENT;
            let plan = fs.readFileSync(`terraform/live/${environment}/${layer}/plan.txt`, 'utf8');
            const max = 60000;
            if (plan.length > max) plan = plan.slice(0, max) + '\n... (truncated)';
            const body = `### Terraform Plan — \`${environment}/${layer}\`\n\`\`\`\n${plan}\n\`\`\``;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Plan to run summary (dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          {
            echo "### Terraform Plan — env \`${ENV}\` layer \`${{ matrix.layer }}\`"
            echo '```'
            cat plan.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail if plan errored
        if: steps.plan.outputs.exitcode != '0'
        run: exit 1

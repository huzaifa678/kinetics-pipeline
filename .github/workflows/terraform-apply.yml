name: terraform-apply

on:
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-apply.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "tfvars profile to apply"
        type: choice
        default: dev
        options:
          - dev
          - prod
          - test
          - novpn # dev + Client VPN OFF
          - kafka # dev + MSK ON

permissions:
  id-token: write # OIDC
  contents: read

# Single global lock: all profiles share ONE terraform state (one backend key),
# so applies must never run concurrently regardless of selected profile.
concurrency:
  group: terraform-apply
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    # Per-env gate + OIDC subject: the chosen profile = the GitHub Environment.
    # Configure required reviewers per env in repo Settings (e.g. gate `prod`).
    environment: ${{ github.event.inputs.environment || 'dev' }}
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4

      # Map the selected profile -> the -var-file chain. dev/prod/test are
      # standalone; novpn/kafka layer on top of dev (later var-file wins). The
      # GitOps env is NOT set here — ArgoCD derives it from the cluster's
      # `environment` label, which Terraform stamps from var.environment.
      - name: Resolve tfvars profile
        id: profile
        env:
          PROFILE: ${{ github.event.inputs.environment || 'dev' }}
        run: |
          case "$PROFILE" in
            dev)   files="-var-file=terraform.tfvars.dev" ;;
            prod)  files="-var-file=terraform.tfvars.prod" ;;
            test)  files="-var-file=terraform.tfvars.test" ;;
            novpn) files="-var-file=terraform.tfvars.dev -var-file=terraform.tfvars.novpn" ;;
            kafka) files="-var-file=terraform.tfvars.dev -var-file=terraform.tfvars.kafka" ;;
            *) echo "::error::unknown profile '$PROFILE'"; exit 1 ;;
          esac
          for f in $(echo "$files" | tr ' ' '\n' | sed 's/-var-file=//'); do
            [ -f "$f" ] || { echo "::error::missing var-file $f"; exit 1; }
          done
          echo "var_files=$files" >> "$GITHUB_OUTPUT"
          echo "### Applying profile \`$PROFILE\` ($files)" >> "$GITHUB_STEP_SUMMARY"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TF_APPLY }}
          aws-region: ${{ vars.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Init
        run: terraform init -input=false

      - name: Apply
        run: terraform apply ${{ steps.profile.outputs.var_files }} -auto-approve -input=false -lock-timeout=120s
        # No GitOps write-back: ArgoCD picks the env overlay from the cluster's
        # `environment` label (stamped by Terraform from var.environment).

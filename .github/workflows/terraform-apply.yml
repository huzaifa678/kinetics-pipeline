name: terraform-apply

on:
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-apply.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "env to apply (selects the live/<env> Terragrunt tree)"
        type: choice
        default: dev
        options:
          - dev
          - prod
      enable_hyperpod:
        description: "HyperPod cold-start control. 'default' = use the layer's input value. Set 'false' for the FIRST infra apply, then 'true' — but ONLY after ArgoCD's `hyperpod-dependencies` chart is Synced+Healthy (the SageMaker cluster CREATE FAILS otherwise)."
        type: choice
        default: "default"
        options:
          - default # honour the layer's input (steady state)
          - "false" # cold-start phase 1 — SageMaker cluster off
          - "true" # phase 2 — only once hyperpod-dependencies is Synced+Healthy

permissions:
  id-token: write # OIDC
  contents: read

env:
  TF_VERSION: "1.10.5"
  # Per-env values now come from Terragrunt inputs (live/<env>/…), NOT tfvars —
  # the env is selected by DIRECTORY. These resolve the unit dirs for shell steps.
  INFRA_DIR: terraform/live/${{ github.event.inputs.environment || 'dev' }}/infra
  CLUSTER_DIR: terraform/live/${{ github.event.inputs.environment || 'dev' }}/cluster

concurrency:
  group: terraform-apply
  cancel-in-progress: false

jobs:
  # 1) Plan against current main + current state, freeze it to tfplan. Read-only
  #    tf-plan role. Ungated so it runs immediately; the human gate is on apply.
  plan:
    runs-on: ubuntu-latest # infra is AWS-API only — no self-hosted/VPN runner needed
    defaults:
      run:
        working-directory: terraform/live/${{ github.event.inputs.environment || 'dev' }}/infra
    steps:
      - uses: actions/checkout@v4

      - name: HyperPod cold-start override
        id: profile
        run: |
          echo "### Apply for env \`${{ github.event.inputs.environment || 'dev' }}\` (infra → cluster)" >> "$GITHUB_STEP_SUMMARY"
          # 'default' keeps the layer's input value; a -var wins over Terragrunt
          # inputs (TF_VAR_*), so this cleanly forces the two-phase bring-up.
          HP="${{ github.event.inputs.enable_hyperpod || 'default' }}"
          extra=""
          if [ "$HP" != "default" ]; then
            extra="-var=enable_hyperpod=$HP"
            echo "- HyperPod override: \`enable_hyperpod=$HP\`" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ "$HP" = "true" ]; then
            echo "::warning::enable_hyperpod=true — the SageMaker cluster CREATE will FAIL unless ArgoCD 'hyperpod-dependencies' is Synced+Healthy. Verify it before approving the apply."
            echo "> ⚠️ **enable_hyperpod=true**: this apply FAILS unless ArgoCD \`hyperpod-dependencies\` is Synced+Healthy. Verify before approving." >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "extra_vars=$extra" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TF_PLAN }}
          aws-region: ${{ vars.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "${{ env.TF_VERSION }}"
          terraform_wrapper: false

      - name: Setup Terragrunt
        uses: ./.github/actions/setup-terragrunt

      - name: Init
        run: terragrunt init -input=false

      # -out writes an ABSOLUTE path so the plan lands in the live dir (terragrunt
      # otherwise writes it inside .terragrunt-cache). That known path is what the
      # OPA gate, the run summary, and the upload/apply all consume.
      - name: Plan
        run: terragrunt plan ${{ steps.profile.outputs.extra_vars }} -input=false -lock-timeout=120s -out="$GITHUB_WORKSPACE/$INFRA_DIR/tfplan"

      # Gate the frozen plan BEFORE it is uploaded for the human approval — the
      # same OPA/Conftest policies as the PR plan, on the exact plan that applies.
      - name: Policy (OPA / Conftest)
        uses: ./.github/actions/opa-policy
        with:
          working-directory: ${{ env.INFRA_DIR }}
          plan-file: ${{ github.workspace }}/${{ env.INFRA_DIR }}/tfplan
          tool: terragrunt

      - name: Plan to run summary
        run: |
          {
            echo '```'
            terragrunt show -no-color "$GITHUB_WORKSPACE/$INFRA_DIR/tfplan"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      # tfplan may contain sensitive values in plaintext — keep it briefly.
      - name: Upload plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ${{ env.INFRA_DIR }}/tfplan
          retention-days: 1
          if-no-files-found: error

  # 2) Apply the exact frozen plan. Gated by the GitHub Environment (required
  #    reviewer per env). If state drifted, `apply tfplan` fails on a stale plan.
  apply:
    needs: plan
    runs-on: ubuntu-latest # infra is AWS-API only — no self-hosted/VPN runner needed
    environment: ${{ github.event.inputs.environment || 'dev' }}
    defaults:
      run:
        working-directory: terraform/live/${{ github.event.inputs.environment || 'dev' }}/infra
    steps:
      - uses: actions/checkout@v4

      - name: Download plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: ${{ env.INFRA_DIR }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TF_APPLY }}
          aws-region: ${{ vars.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "${{ env.TF_VERSION }}"
          terraform_wrapper: false

      - name: Setup Terragrunt
        uses: ./.github/actions/setup-terragrunt

      - name: Init
        run: terragrunt init -input=false

      # Saved plan: inputs are baked in. The plan file is passed by ABSOLUTE path —
      # terragrunt runs `terraform apply` inside .terragrunt-cache, so a relative
      # name in the live dir would not resolve.
      - name: Apply
        run: terragrunt apply -input=false -lock-timeout=120s "$GITHUB_WORKSPACE/$INFRA_DIR/tfplan"

  # 3) CLUSTER layer (kubernetes/helm/kubectl). MUST run after the infra apply —
  #    its providers read the infra layer's fresh remote state. Not a saved plan.
  #    Same env gate + least-privilege tf-apply role (ci-deployer group). The
  #    ONE-TIME escalation-capable bootstrap (ci-deployer RBAC + ArgoCD) is done by
  #    the gated cluster-bootstrap.yml workflow; after that this job reconciles.
  cluster_apply:
    needs: apply
    runs-on: [self-hosted, vpc] # ONLY layer that needs the VPN-locked K8s API
    environment: ${{ github.event.inputs.environment || 'dev' }}
    defaults:
      run:
        working-directory: terraform/live/${{ github.event.inputs.environment || 'dev' }}/cluster
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TF_APPLY }}
          aws-region: ${{ vars.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "${{ env.TF_VERSION }}"
          terraform_wrapper: false

      - name: Setup Terragrunt
        uses: ./.github/actions/setup-terragrunt

      - name: Init
        run: terragrunt init -input=false

      - name: Apply
        run: terragrunt apply -input=false -lock-timeout=120s -auto-approve

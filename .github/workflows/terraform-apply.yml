name: terraform-apply

# Apply on merge to main (or manual dispatch). Gated by the `production`
# Environment — configure required reviewers on it in repo Settings so applies
# need a human approval. Assumes the apply role via OIDC.
on:
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-apply.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: terraform-apply
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TF_APPLY }}
          aws-region: ${{ vars.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Init
        run: terraform init -input=false

      - name: Apply
        run: terraform apply -var-file=terraform.tfvars.dev -auto-approve -input=false -lock-timeout=120s

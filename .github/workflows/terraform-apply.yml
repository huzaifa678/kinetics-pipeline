name: terraform-apply

on:
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-apply.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "tfvars profile to apply"
        type: choice
        default: dev
        options:
          - dev
          - prod
          - test
          - novpn # dev + Client VPN OFF
          - kafka # dev + MSK ON

permissions:
  id-token: write # OIDC
  contents: read

env:
  TF_VERSION: "1.10.5"

concurrency:
  group: terraform-apply
  cancel-in-progress: false

jobs:
  # 1) Plan against current main + current state, freeze it to tfplan. Read-only
  #    tf-plan role — no write creds needed to produce a plan. Ungated so it runs
  #    immediately; the human gate is on the apply job.
  plan:
    runs-on: ubuntu-latest # infra is AWS-API only — no self-hosted/VPN runner needed
    defaults:
      run:
        working-directory: terraform/infra
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tfvars profile
        id: profile
        env:
          PROFILE: ${{ github.event.inputs.environment || 'dev' }}
        run: |
          case "$PROFILE" in
            dev)   files="-var-file=terraform.tfvars.dev" ;;
            prod)  files="-var-file=terraform.tfvars.prod" ;;
            test)  files="-var-file=terraform.tfvars.test" ;;
            novpn) files="-var-file=terraform.tfvars.dev -var-file=terraform.tfvars.novpn" ;;
            kafka) files="-var-file=terraform.tfvars.dev -var-file=terraform.tfvars.kafka" ;;
            *) echo "::error::unknown profile '$PROFILE'"; exit 1 ;;
          esac
          for f in $(echo "$files" | tr ' ' '\n' | sed 's/-var-file=//'); do
            [ -f "$f" ] || { echo "::error::missing var-file $f"; exit 1; }
          done
          echo "var_files=$files" >> "$GITHUB_OUTPUT"
          echo "### Plan for profile \`$PROFILE\` ($files)" >> "$GITHUB_STEP_SUMMARY"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TF_PLAN }}
          aws-region: ${{ vars.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "${{ env.TF_VERSION }}"
          terraform_wrapper: false

      - name: Init
        run: terraform init -input=false

      - name: Plan
        run: terraform plan ${{ steps.profile.outputs.var_files }} -input=false -lock-timeout=120s -out=tfplan

      # Gate the frozen plan BEFORE it is uploaded for the human approval — the
      # same OPA/Conftest policies as the PR plan, on the exact plan that applies.
      # A `deny` fails here, so a violating plan never reaches the apply job.
      - name: Policy (OPA / Conftest)
        uses: ./.github/actions/opa-policy
        with:
          working-directory: terraform/infra
          plan-file: tfplan

      - name: Plan to run summary
        run: |
          {
            echo '```'
            terraform show -no-color tfplan
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      # tfplan may contain sensitive values in plaintext — keep it briefly and
      # only for this run's apply job.
      - name: Upload plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: terraform/infra/tfplan
          retention-days: 1
          if-no-files-found: error

  # 2) Apply the exact frozen plan. Gated by the GitHub Environment (required
  #    reviewer per env, e.g. prod) — the reviewer approves AFTER seeing the plan
  #    in job 1's summary, so what's approved is exactly what applies. If state
  #    drifted out-of-band, `apply tfplan` fails on a stale plan (safe).
  apply:
    needs: plan
    runs-on: ubuntu-latest # infra is AWS-API only — no self-hosted/VPN runner needed
    environment: ${{ github.event.inputs.environment || 'dev' }}
    defaults:
      run:
        working-directory: terraform/infra
    steps:
      - uses: actions/checkout@v4

      - name: Download plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: terraform/infra

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TF_APPLY }}
          aws-region: ${{ vars.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "${{ env.TF_VERSION }}"
          # Self-hosted runner has no system `node` on PATH; the default wrapper
          # is a node shim around `terraform` and fails every run step with
          # `env: node: No such file or directory`. We don't consume the wrapper's
          # step outputs, so disable it.
          terraform_wrapper: false

      - name: Init
        run: terraform init -input=false

      # Saved plan: vars are baked in (no -var-file), and it applies without an
      # extra approval. GitOps is not written back — ArgoCD picks the env overlay
      # from the cluster's `environment` label (stamped from var.environment).
      - name: Apply
        run: terraform apply -input=false -lock-timeout=120s tfplan

  # 3) CLUSTER layer (kubernetes/helm/kubectl). MUST run after the infra apply —
  #    its providers read the infra layer's fresh remote state. Not a saved plan:
  #    the cluster plan depends on infra's just-applied outputs, so it plans+applies
  #    here. Same env gate + tf-apply role. First-ever run must be an admin on the
  #    VPN (ci-deployer RBAC escalation) — see scripts/bootstrap-cluster-access.sh.
  cluster_apply:
    needs: apply
    runs-on: [self-hosted, vpc] # ONLY layer that needs the VPN-locked K8s API
    environment: ${{ github.event.inputs.environment || 'dev' }}
    defaults:
      run:
        working-directory: terraform/cluster
    steps:
      - uses: actions/checkout@v4

      - name: Resolve cluster tfvars (optional — defaults if absent)
        id: profile
        env:
          PROFILE: ${{ github.event.inputs.environment || 'dev' }}
        run: |
          f="terraform.tfvars.${PROFILE}"
          if [ -f "$f" ]; then echo "var_files=-var-file=$f" >> "$GITHUB_OUTPUT";
          else echo "::notice::cluster: no $f (using defaults)"; echo "var_files=" >> "$GITHUB_OUTPUT"; fi

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TF_APPLY }}
          aws-region: ${{ vars.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "${{ env.TF_VERSION }}"
          terraform_wrapper: false

      - name: Init
        run: terraform init -input=false

      - name: Apply
        run: terraform apply ${{ steps.profile.outputs.var_files }} -input=false -lock-timeout=120s -auto-approve

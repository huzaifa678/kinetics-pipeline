name: terraform-scan

# Static guardrails for the repo. Scans terraform, dockefile and github actions for security misconfigurations, and scans helm charts for CVEs. Also runs Infracost to
on:
  pull_request:
    paths:
      - "terraform/**"
      - "training/Dockerfile*"
      - ".checkov.yaml"
      - "policy/**"
      - ".github/workflows/terraform-scan.yml"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write # infracost comment

jobs:
  # Rego unit tests — static, no AWS creds. Guards the plan-time gate (the
  # policies in policy/ that terraform-plan / terraform-apply enforce against the
  # tfplan JSON) from silently breaking. Uses the same pinned Conftest.
  policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Conftest
        env:
          CONFTEST_VERSION: "0.56.0"
        run: |
          set -euo pipefail
          base="https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VERSION}"
          tarball="conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz"
          curl -fsSL "${base}/${tarball}"    -o "${tarball}"
          curl -fsSL "${base}/checksums.txt" -o checksums.txt
          grep " ${tarball}\$" checksums.txt | sha256sum -c -
          tar -xzf "${tarball}" conftest && sudo install -m 0755 conftest /usr/local/bin/conftest
      - name: conftest verify (rego unit tests)
        run: conftest verify --policy policy/

      # Org supply-chain gate on the Dockerfiles (approved base registries, no
      # curl|sh) — complements Checkov's generic Dockerfile misconfig checks.
      - name: conftest test (Dockerfiles)
        run: |
          conftest test training/Dockerfile training/Dockerfile.serve training/Dockerfile.seldon \
            --parser dockerfile --policy policy --namespace docker

  checkov:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkov (terraform + dockerfile + secrets + actions)
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          config_file: .checkov.yaml
          framework: terraform,dockerfile,secrets,github_actions
          output_format: cli

  infracost:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    env:
      INFRACOST_API_KEY: ${{ secrets.INFRACOST_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: infracost/actions/setup@v3
        with:
          api-key: ${{ env.INFRACOST_API_KEY }}

      # Infracost evaluates the prod Terragrunt unit directly (it detects the
      # terragrunt.hcl and reads its inputs — no more --terraform-var-file), so
      # terragrunt must be on PATH.
      - name: Setup Terragrunt
        uses: ./.github/actions/setup-terragrunt

      - name: Infracost baseline (target branch)
        run: |
          git checkout "${{ github.event.pull_request.base.ref }}"
          infracost breakdown --path=terraform/live/prod/infra \
            --format=json --out-file=/tmp/infracost-base.json || echo "{}" > /tmp/infracost-base.json
          git checkout "${{ github.event.pull_request.head.sha }}"

      - name: Infracost diff (PR)
        run: |
          infracost diff --path=terraform/live/prod/infra \
            --compare-to=/tmp/infracost-base.json \
            --format=json --out-file=/tmp/infracost.json

      - name: Post cost comment
        run: |
          infracost comment github --path=/tmp/infracost.json \
            --repo="$GITHUB_REPOSITORY" \
            --pull-request="${{ github.event.pull_request.number }}" \
            --github-token="${{ github.token }}" \
            --behavior=update

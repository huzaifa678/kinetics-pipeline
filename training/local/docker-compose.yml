services:
  inference:
    build:
      context: ..
      dockerfile: Dockerfile.serve
    image: kinetics-inference:local
    ports:
      - "8080:8080"
    environment:
      MODEL_DIR: /opt/ml/model
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: kinetics-inference
      LOG_LEVEL: INFO
    volumes:
      - ./model:/opt/ml/model:ro
    depends_on:
      - otel-collector

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.115.1
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel/config.yaml:ro
    ports:
      - "4318:4318"   # OTLP HTTP (matches the service's default endpoint)
      - "4317:4317"   # OTLP gRPC

  prometheus:
    image: prom/prometheus:v2.55.1
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.3.1
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./grafana-datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

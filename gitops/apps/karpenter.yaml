# Karpenter — JIT node autoscaling on the EKS side. Auth via EKS Pod Identity
# (association created in Terraform), so no IRSA annotation here. The chart
# creates the "karpenter" ServiceAccount that the association is bound to.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: karpenter
  namespace: argocd
  annotations:
    # Controller + CRDs first; the NodePool/EC2NodeClass app is wave 1.
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: public.ecr.aws/karpenter
    chart: karpenter
    targetRevision: 1.0.6
    helm:
      parameters:
        # Set to your cluster name (project-environment), e.g. kinetics-pipeline-dev.
        - name: settings.clusterName
          value: kinetics-pipeline-dev
        # SQS interruption queue (Terraform module.karpenter): "<cluster>-karpenter".
        - name: settings.interruptionQueue
          value: kinetics-pipeline-dev-karpenter
        - name: serviceAccount.create
          value: "true"
        - name: serviceAccount.name
          value: karpenter
  destination:
    server: https://kubernetes.default.svc
    namespace: karpenter
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

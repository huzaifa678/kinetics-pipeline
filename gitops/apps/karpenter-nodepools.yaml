# Karpenter NodePool + EC2NodeClass. Sync-wave 1 so it applies AFTER the
# Karpenter controller (wave 0) has installed its CRDs.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: karpenter-nodepools
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    # Raw manifests in this repo (set to your repo URL).
    repoURL: https://github.com/huzaifa678/kinetics-pipeline.git
    targetRevision: main
    path: gitops/karpenter
  destination:
    server: https://kubernetes.default.svc
    namespace: karpenter
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    # Tolerate the CRDs not existing on the very first pass.
    syncOptions:
      - SkipDryRunOnMissingResource=true
    retry:
      limit: 5
      backoff:
        duration: 15s
        maxDuration: 3m
        factor: 2

# NodePool — what Karpenter is allowed to provision for general/utility CPU
# workloads (controllers, ArgoCD, Prometheus, dataset prep jobs). GPU training
# nodes are NOT here — those are managed by the HyperPod cluster.
#
# COST CONTROL:
#   - Spot first (falls back to on-demand) -> cheapest capacity.
#   - Consolidation removes empty/underutilized nodes quickly -> scale-to-zero.
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: default
spec:
  template:
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: kubernetes.io/os
          operator: In
          values: ["linux"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["spot", "on-demand"]
        - key: karpenter.k8s.aws/instance-category
          operator: In
          values: ["c", "m", "r"]
        - key: karpenter.k8s.aws/instance-generation
          operator: Gt
          values: ["4"]
      # Recycle nodes regularly so they stay patched.
      expireAfter: 720h
  limits:
    cpu: "100"
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 1m
